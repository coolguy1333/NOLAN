<!DOCTYPE html>

<html>
    <head>
        <title>5 Letter Word Game</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="guessArea">
            <div class="guessLetter" id="guess1letter1"></div>
            <div class="guessLetter" id="guess1letter2"></div>
            <div class="guessLetter" id="guess1letter3"></div>
            <div class="guessLetter" id="guess1letter4"></div>
            <div class="guessLetter" id="guess1letter5"></div>

            <div class="guessLetter" id="guess2letter1"></div>
            <div class="guessLetter" id="guess2letter2"></div>
            <div class="guessLetter" id="guess2letter3"></div>
            <div class="guessLetter" id="guess2letter4"></div>
            <div class="guessLetter" id="guess2letter5"></div>

            <div class="guessLetter" id="guess3letter1"></div>
            <div class="guessLetter" id="guess3letter2"></div>
            <div class="guessLetter" id="guess3letter3"></div>
            <div class="guessLetter" id="guess3letter4"></div>
            <div class="guessLetter" id="guess3letter5"></div>

            <div class="guessLetter" id="guess4letter1"></div>
            <div class="guessLetter" id="guess4letter2"></div>
            <div class="guessLetter" id="guess4letter3"></div>
            <div class="guessLetter" id="guess4letter4"></div>
            <div class="guessLetter" id="guess4letter5"></div>

            <div class="guessLetter" id="guess5letter1"></div>
            <div class="guessLetter" id="guess5letter2"></div>
            <div class="guessLetter" id="guess5letter3"></div>
            <div class="guessLetter" id="guess5letter4"></div>
            <div class="guessLetter" id="guess5letter5"></div>

            <div class="guessLetter" id="guess6letter1"></div>
            <div class="guessLetter" id="guess6letter2"></div>
            <div class="guessLetter" id="guess6letter3"></div>
            <div class="guessLetter" id="guess6letter4"></div>
            <div class="guessLetter" id="guess6letter5"></div>
        </div>

        <div class="letterSection">
            <div class="letterRow">
                <input type="button" class="letterButton" value="Q" id="Q" onclick="letterClicked('Q')">
                <input type="button" class="letterButton" value="W" id="W" onclick="letterClicked('W')">
                <input type="button" class="letterButton" value="E" id="E" onclick="letterClicked('E')">
                <input type="button" class="letterButton" value="R" id="R" onclick="letterClicked('R')">
                <input type="button" class="letterButton" value="T" id="T" onclick="letterClicked('T')">
                <input type="button" class="letterButton" value="Y" id="Y" onclick="letterClicked('Y')">
                <input type="button" class="letterButton" value="U" id="U" onclick="letterClicked('U')">
                <input type="button" class="letterButton" value="I" id="I" onclick="letterClicked('I')">
                <input type="button" class="letterButton" value="O" id="O" onclick="letterClicked('O')">
                <input type="button" class="letterButton" value="P" id="P" onclick="letterClicked('P')">
            </div>
            <div class="letterRow">
                <input type="button" class="letterButton" value="A" id="A" onclick="letterClicked('A')">
                <input type="button" class="letterButton" value="S" id="S" onclick="letterClicked('S')">
                <input type="button" class="letterButton" value="D" id="D" onclick="letterClicked('D')">
                <input type="button" class="letterButton" value="F" id="F" onclick="letterClicked('F')">
                <input type="button" class="letterButton" value="G" id="G" onclick="letterClicked('G')">
                <input type="button" class="letterButton" value="H" id="H" onclick="letterClicked('H')">
                <input type="button" class="letterButton" value="J" id="J" onclick="letterClicked('J')">
                <input type="button" class="letterButton" value="K" id="K" onclick="letterClicked('K')">
                <input type="button" class="letterButton" value="L" id="L" onclick="letterClicked('L')">
            </div>
            <div class="letterRow">
                <input type="button" class="letterButton" value="Enter" id="Enter" onclick="submitGuess()">
                <input type="button" class="letterButton" value="Z" id="Z" onclick="letterClicked('Z')">
                <input type="button" class="letterButton" value="X" id="X" onclick="letterClicked('X')">
                <input type="button" class="letterButton" value="C" id="C" onclick="letterClicked('C')">
                <input type="button" class="letterButton" value="V" id="V" onclick="letterClicked('V')">
                <input type="button" class="letterButton" value="B" id="B" onclick="letterClicked('B')">
                <input type="button" class="letterButton" value="N" id="N" onclick="letterClicked('N')">
                <input type="button" class="letterButton" value="M" id="M" onclick="letterClicked('M')">
                <input type="button" class="letterButton" value="Delete" id="Delete" onclick="deleteClicked()">
            </div>
        </div>

        <p id="solution" class="solution"></p>

        <input type="button" class="resetButton" id="resetButton" value="New Game" onclick="resetGame()">

        <script src="index.js"></script>
    </body>
</html>
